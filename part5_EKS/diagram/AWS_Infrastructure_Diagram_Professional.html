<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS EKS Infrastructure - Professional Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Amazon Ember', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #232f3e 0%, #37475a 100%);
            border-radius: 6px;
        }
        
        .aws-logo {
            width: 40px;
            height: 40px;
            background: #FF9900;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            margin-right: 15px;
        }
        
        .header-text {
            color: white;
        }
        
        .header-text h1 {
            font-size: 22px;
            margin-bottom: 3px;
        }
        
        .header-text p {
            font-size: 13px;
            color: #aab7b8;
        }
        
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .legend {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .legend-color {
            width: 30px;
            height: 20px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }
        
        /* AWS Service Colors */
        .aws-region { fill: #ffffff; stroke: #879196; stroke-width: 2; stroke-dasharray: 5,5; }
        .aws-vpc { fill: #f0f4ff; stroke: #7AA3E5; stroke-width: 3; }
        .aws-az { fill: none; stroke: #147eba; stroke-width: 2; stroke-dasharray: 5,5; }
        .aws-public-subnet { fill: #e6f4ea; stroke: #34A853; stroke-width: 2; }
        .aws-private-subnet { fill: #fce8e6; stroke: #EA4335; stroke-width: 2; }
        .aws-db-subnet { fill: #e8f0fe; stroke: #4285F4; stroke-width: 2; }
        
        /* Service Icons */
        .service-box {
            stroke-width: 2;
            rx: 4;
        }
        
        .alb-box { fill: #f48fb1; stroke: #ec407a; }
        .nat-box { fill: #81c784; stroke: #66bb6a; }
        .igw-box { fill: #64b5f6; stroke: #42a5f5; }
        .eks-box { fill: #fff9c4; stroke: #fbc02d; }
        .rds-box { fill: #9fa8da; stroke: #5c6bc0; }
        .ecr-box { fill: #90a4ae; stroke: #607d8b; }
        
        /* Text Styles */
        .title { font-size: 14px; font-weight: 600; fill: #232f3e; }
        .subtitle { font-size: 11px; fill: #546e7a; }
        .label { font-size: 10px; fill: #37474f; }
        .cidr { font-size: 9px; fill: #607d8b; font-family: 'Courier New', monospace; }
        .port { font-size: 9px; fill: #d32f2f; font-weight: 600; }
        
        /* Connections */
        .connection { stroke: #90a4ae; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
        .connection-data { stroke: #1976d2; stroke-width: 2; fill: none; stroke-dasharray: 4,4; marker-end: url(#arrowhead-blue); }
        .connection-secure { stroke: #388e3c; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-green); }
        
        /* Security Group Boxes */
        .sg-box {
            fill: none;
            stroke: #e53935;
            stroke-width: 2;
            stroke-dasharray: 5,3;
            rx: 6;
        }
        
        .sg-label {
            fill: #e53935;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="aws-logo">AWS</div>
            <div class="header-text">
                <h1>Student Portal AWS Account</h1>
                <p>EKS Infrastructure - 3-Tier Architecture</p>
            </div>
        </div>
        
        <svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Arrow markers -->
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#90a4ae" />
                </marker>
                <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#1976d2" />
                </marker>
                <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#388e3c" />
                </marker>
                
                <!-- AWS Icons as SVG symbols -->
                <symbol id="icon-vpc" viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" rx="2"/>
                    <path d="M2 8 h20 M8 2 v20" stroke="currentColor" stroke-width="1"/>
                </symbol>
                
                <symbol id="icon-subnet" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" fill="currentColor" opacity="0.2" rx="2"/>
                    <rect x="3" y="3" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" rx="2"/>
                </symbol>
                
                <symbol id="icon-security" viewBox="0 0 24 24">
                    <path d="M12 2 L4 6 v5 c0 5 3 9 8 11 c5-2 8-6 8-11 V6 z" fill="currentColor"/>
                </symbol>
                
                <symbol id="icon-database" viewBox="0 0 24 24">
                    <ellipse cx="12" cy="6" rx="8" ry="3" fill="currentColor"/>
                    <path d="M4 6 v12 c0 1.7 3.6 3 8 3 s8-1.3 8-3 V6" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M4 12 c0 1.7 3.6 3 8 3 s8-1.3 8-3" fill="none" stroke="currentColor" stroke-width="1.5"/>
                </symbol>
            </defs>
            
            <!-- AWS Region -->
            <rect class="aws-region" x="10" y="10" width="1380" height="980" rx="8"/>
            <text class="title" x="30" y="35">
                <tspan style="font-size: 16px;">🌎</tspan> us-east-1
            </text>
            
            <!-- VPC -->
            <rect class="aws-vpc" x="40" y="60" width="1320" height="910" rx="6"/>
            <text class="title" x="60" y="85">
                <tspan style="font-size: 16px;">🏢</tspan> VPC
            </text>
            <text class="subtitle" x="60" y="102">10.0.0.0/16</text>
            
            <!-- Amazon ECR (top center) -->
            <rect class="ecr-box service-box" x="630" y="120" width="140" height="70" />
            <text class="title" x="660" y="145">
                <tspan style="font-size: 16px;">📦</tspan> Amazon ECR
            </text>
            <text class="label" x="650" y="165">studentportal:latest</text>
            <text class="cidr" x="650" y="180">216989097838.dkr.ecr</text>
            
            <!-- Internet Gateway -->
            <ellipse cx="700" cy="240" rx="45" ry="45" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>
            <text class="title" x="675" y="245" style="font-size: 24px;">🌐</text>
            
            <!-- Availability Zone 1 -->
            <g id="az-1">
                <rect class="aws-az" x="70" y="290" width="600" height="650" rx="6"/>
                <text class="subtitle" x="90" y="315" style="fill: #147eba;">Availability Zone 1 (us-east-1a)</text>
                
                <!-- Public Subnet 1 -->
                <rect class="aws-public-subnet" x="100" y="330" width="540" height="140" rx="4"/>
                <text class="title" x="120" y="355">
                    <tspan style="font-size: 14px;">🔓</tspan> Public subnet
                </text>
                <text class="cidr" x="120" y="372">10.0.1.0/24</text>
                
                <!-- ALB in Public Subnet -->
                <rect class="alb-box service-box" x="380" y="385" width="240" height="60"/>
                <text class="title" x="410" y="408">⚖️ Application Load Balancer</text>
                <text class="label" x="420" y="425">eks.eva-tee.com</text>
                <text class="port" x="460" y="440">HTTPS:443 / HTTP:80</text>
                
                <!-- Security Group Label -->
                <text class="sg-label" x="520" y="365">ALB-SG</text>
                <text class="port" x="520" y="378">80/443</text>
                
                <!-- NAT Gateway -->
                <rect class="nat-box service-box" x="120" y="385" width="120" height="60"/>
                <text class="title" x="135" y="408">🔀 NAT</text>
                <text class="title" x="135" y="425">Gateway</text>
                <text class="label" x="135" y="440" style="font-size: 8px;">Elastic IP</text>
                
                <!-- Route Table Info -->
                <text class="label" x="110" y="460" style="fill: #ff6f00; font-weight: 600;">172.16.0.0</text>
                <text class="label" x="110" y="475" style="fill: #ff6f00; font-weight: 600;">172.16.1.0</text>
                <text class="label" x="110" y="490" style="fill: #ff6f00; font-weight: 600;">172.16.2.0</text>
                
                <!-- Private Subnet 1 (EKS) -->
                <rect class="aws-private-subnet" x="100" y="510" width="540" height="160" rx="4"/>
                <text class="title" x="120" y="535">
                    <tspan style="font-size: 14px;">🔒</tspan> Private subnet
                </text>
                <text class="cidr" x="120" y="552">10.0.3.0/24</text>
                
                <!-- EKS Nodes/Pods -->
                <rect class="eks-box service-box" x="380" y="570" width="240" height="80"/>
                <text class="title" x="420" y="595">☸️ EKS Pods (x3)</text>
                <text class="label" x="420" y="612">student-portal</text>
                <text class="label" x="420" y="627">Container: Flask</text>
                <text class="port" x="460" y="642">Port: 8000</text>
                
                <!-- Security Group Label -->
                <text class="sg-label" x="490" y="560">ECS-student-SG</text>
                <text class="port" x="520" y="573">8000</text>
                
                <!-- Route Table Info -->
                <text class="label" x="110" y="680" style="fill: #ff6f00; font-weight: 600;">172.16.0.0</text>
                <text class="label" x="110" y="695" style="fill: #ff6f00; font-weight: 600;">172.16.1.0</text>
                <text class="label" x="110" y="710" style="fill: #ff6f00; font-weight: 600;">172.16.2.0</text>
                
                <!-- Private Subnet 1 (RDS) -->
                <rect class="aws-db-subnet" x="100" y="730" width="540" height="180" rx="4"/>
                <text class="title" x="120" y="755">
                    <tspan style="font-size: 14px;">🔒</tspan> Private subnet
                </text>
                <text class="cidr" x="120" y="772">10.0.5.0/24</text>
                
                <!-- RDS Master -->
                <g transform="translate(380, 790)">
                    <ellipse cx="70" cy="60" rx="65" ry="60" fill="#3f51b5" opacity="0.9"/>
                    <text x="50" y="60" style="fill: white; font-size: 36px; font-weight: bold;">M</text>
                    <text class="title" x="25" y="80" style="fill: white; font-size: 11px;">PostgreSQL</text>
                    <text class="cidr" x="120" y="825" style="fill: #232f3e;">10.0.5.0/24</text>
                </g>
                
                <!-- Security Group Label -->
                <text class="sg-label" x="500" y="785">RDS-SG</text>
                <text class="port" x="515" y="798">5432</text>
            </g>
            
            <!-- Availability Zone 2 -->
            <g id="az-2">
                <rect class="aws-az" x="710" y="290" width="600" height="650" rx="6"/>
                <text class="subtitle" x="730" y="315" style="fill: #147eba;">Availability Zone 2 (us-east-1b)</text>
                
                <!-- Public Subnet 2 -->
                <rect class="aws-public-subnet" x="740" y="330" width="540" height="140" rx="4"/>
                <text class="title" x="760" y="355">
                    <tspan style="font-size: 14px;">🔓</tspan> Public subnet
                </text>
                <text class="cidr" x="760" y="372">10.0.2.0/24</text>
                
                <!-- Private Subnet 2 (EKS) -->
                <rect class="aws-private-subnet" x="740" y="510" width="540" height="160" rx="4"/>
                <text class="title" x="760" y="535">
                    <tspan style="font-size: 14px;">🔒</tspan> Private subnet
                </text>
                <text class="cidr" x="760" y="552">10.0.4.0/24</text>
                
                <!-- Private Subnet 2 (RDS) -->
                <rect class="aws-db-subnet" x="740" y="730" width="540" height="180" rx="4"/>
                <text class="title" x="760" y="755">
                    <tspan style="font-size: 14px;">🔒</tspan> Private subnet
                </text>
                <text class="cidr" x="760" y="772">10.0.6.0/24</text>
                
                <!-- RDS Standby -->
                <g transform="translate(1020, 790)">
                    <ellipse cx="70" cy="60" rx="65" ry="60" fill="#5c6bc0" opacity="0.9"/>
                    <text x="52" y="60" style="fill: white; font-size: 36px; font-weight: bold;">S</text>
                    <text class="title" x="30" y="80" style="fill: white; font-size: 11px;">Standby</text>
                    <text class="cidr" x="760" y="825" style="fill: #232f3e;">10.0.6.0/24</text>
                </g>
            </g>
            
            <!-- EKS Control Plane (outside AZ boxes, top right) -->
            <rect class="eks-box service-box" x="1120" y="120" width="220" height="120" rx="6"/>
            <text class="title" x="1150" y="145">☸️ EKS Control Plane</text>
            <text class="label" x="1150" y="165">eks-cluster-part5-3rdjan</text>
            <text class="label" x="1150" y="180">Kubernetes v1.31</text>
            <text class="label" x="1150" y="200" style="font-size: 9px;">Add-ons:</text>
            <text class="label" x="1150" y="213" style="font-size: 9px;">• CoreDNS</text>
            <text class="label" x="1150" y="226" style="font-size: 9px;">• kube-proxy • VPC-CNI</text>
            
            <!-- Connections/Arrows -->
            
            <!-- Internet to IGW -->
            <line class="connection" x1="700" y1="200" x2="700" y2="240" />
            
            <!-- IGW to NAT -->
            <path class="connection" d="M 675 280 L 180 385" />
            
            <!-- IGW to ALB -->
            <path class="connection-secure" d="M 700 285 L 500 385" />
            
            <!-- ALB to EKS Pods -->
            <line class="connection-secure" x1="500" y1="445" x2="500" y2="570" />
            
            <!-- EKS Pods to RDS Master -->
            <path class="connection-data" d="M 500 650 L 450 790" />
            
            <!-- ECR to EKS Pods -->
            <path class="connection-data" d="M 700 190 L 500 570" />
            
            <!-- EKS Control to Pods -->
            <path class="connection" d="M 1120 180 L 620 610" />
            
            <!-- Security Group Boxes -->
            <rect class="sg-box" x="370" y="375" width="260" height="80"/>
            <rect class="sg-box" x="370" y="560" width="260" height="100"/>
            <rect class="sg-box" x="370" y="780" width="280" height="140"/>
            
        </svg>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #e6f4ea; border-color: #34A853;"></div>
                <span>Public Subnet</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #fce8e6; border-color: #EA4335;"></div>
                <span>Private Subnet (App)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #e8f0fe; border-color: #4285F4;"></div>
                <span>Private Subnet (Database)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: transparent; border: 2px dashed #e53935;"></div>
                <span>Security Group</span>
            </div>
            <div class="legend-item">
                <span style="color: #388e3c; font-weight: bold;">━━━▶</span>
                <span>HTTPS/Secure Connection</span>
            </div>
            <div class="legend-item">
                <span style="color: #1976d2; font-weight: bold;">╌╌╌▶</span>
                <span>Data Flow</span>
            </div>
        </div>
    </div>
</body>
</html>
