apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app
  namespace: app
  labels:
    app: react-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react
          image: node:18-alpine
          command: ["sh", "-c"]
          args:
            - |
              npx create-react-app myapp --template default && \
              cd myapp && npm start
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: react-app-svc
  namespace: app
spec:
  selector:
    app: react-app
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
