apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-app2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Evatee-coder/part5-github-oidc-aws
    path: Part8/app2
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true